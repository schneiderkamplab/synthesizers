[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "synthesizers"
version = "1.3.0"
authors = [
  { name="Peter Schneider-Kamp" }
]

description = "A meta framework for synthetic data generation."
readme = "README.md"
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

dependencies = [
    'datasets==2.19.2',
    'fastcore>=1.7.1,<1.8',
    'numpy<2',
    'openpyxl',
    'pandas<3',
    'pgmpy<1',
    'py-synthpop @ git+https://github.com/schneiderkamplab/py-synthpop.git',
    'pydantic>=2,<3',
    'opacus<1.5',
    'scikit-learn>=1.5,<1.8',
    'scipy~=1.12.0',
    'subprocessing',
    'synthcity==0.2.12',
    'syntheval==1.5.1',
    'transformers<5',
    'xgbse>=0.3.1,<0.4',
]

[project.urls]
"Homepage" = "https://github.com/schneiderkamplab/synthesizers"
"Bug Tracker" = "https://github.com/schneiderkamplab/synthesizers/issues"

[tool.hatch.build]
include = [
    'synthesizers',
    'LICENSE',
    'README.md',
]

[tool.hatch.metadata]
allow-direct-references = true
